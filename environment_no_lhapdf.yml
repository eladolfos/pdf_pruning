# Conda environment file for pdf_pruning package WITHOUT LHAPDF
# Use this if you want to avoid LHAPDF installation issues
# Install with: conda env create -f environment_no_lhapdf.yml
# Activate with: conda activate pdf_pruning

# Note: This environment skips LHAPDF. The analysis.py module won't work
# if it's used, but clustering and visualization functions will work fine.
# If you need LHAPDF, use: environment.yml instead

name: pdf_pruning
channels:
  - conda-forge
  - defaults
dependencies:
  # Core dependencies
  - python=3.10
  - numpy>=1.20.0,<2.0.0
  - pandas>=1.3.0,<3.0.0
  - scipy>=1.7.0,<2.0.0
  - plotly>=5.0.0,<6.0.0

  # Jupyter (optional but useful for development)
  - jupyter>=1.0.0
  - notebook>=6.4.0

  # Development tools (optional)
  - pytest>=6.0.0
  - black>=21.0.0
  - flake8>=3.9.0

  # pip dependencies
  - pip
  - pip:
    # Keeping empty - LHAPDF is skipped intentionally
